<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .search-box {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box input {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            width: 300px;
            font-size: 1em;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            transform: scale(1.05);
        }

        .search-box button {
            padding: 12px 30px;
            border: none;
            background: white;
            color: #667eea;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .search-box button:hover {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }

        .current-weather {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .city-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .city-name {
            font-size: 2.5em;
            color: #333;
            font-weight: bold;
        }

        .date-time {
            font-size: 1em;
            color: #666;
        }

        .main-weather {
            display: flex;
            gap: 40px;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .weather-icon {
            font-size: 8em;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .temperature {
            font-size: 4em;
            color: #667eea;
            font-weight: bold;
        }

        .weather-description {
            font-size: 1.5em;
            color: #666;
            text-transform: capitalize;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #eee;
        }

        .detail-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .detail-card:hover {
            transform: translateY(-5px);
        }

        .detail-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .detail-value {
            font-size: 1.8em;
            font-weight: bold;
        }

        .forecast {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .forecast-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .forecast-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .forecast-time {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
        }

        .forecast-icon {
            font-size: 3em;
            margin: 10px 0;
        }

        .forecast-temp {
            font-size: 1.3em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .forecast-description {
            font-size: 0.85em;
            color: #666;
            text-transform: capitalize;
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .suggestions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .suggestion-btn {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .suggestion-btn:hover {
            background: white;
            color: #667eea;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .search-box input {
                width: 100%;
                max-width: 250px;
            }

            .current-weather {
                padding: 20px;
            }

            .main-weather {
                gap: 20px;
            }

            .weather-icon {
                font-size: 5em;
            }

            .temperature {
                font-size: 2.5em;
            }

            .city-name {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ Weather Dashboard</h1>
            <p>Get real-time weather information for any location</p>
        </div>

        <div class="search-box">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Enter city name..." 
                onkeypress="if(event.key === 'Enter') searchWeather()"
            >
            <button onclick="searchWeather()">Search</button>
        </div>

        <div class="suggestions">
            <button class="suggestion-btn" onclick="searchCity('London')">London</button>
            <button class="suggestion-btn" onclick="searchCity('New York')">New York</button>
            <button class="suggestion-btn" onclick="searchCity('Tokyo')">Tokyo</button>
            <button class="suggestion-btn" onclick="searchCity('Paris')">Paris</button>
            <button class="suggestion-btn" onclick="searchCity('Dubai')">Dubai</button>
        </div>

        <div id="weatherContainer"></div>
    </div>

    <script>
        // Weather icons mapping
        const weatherIcons = {
            'clear sky': '☀️',
            'few clouds': '🌤️',
            'scattered clouds': '☁️',
            'broken clouds': '☁️',
            'shower rain': '🌧️',
            'rain': '🌧️',
            'thunderstorm': '⛈️',
            'snow': '❄️',
            'mist': '🌫️',
            'clouds': '☁️',
            'overcast': '☁️',
            'sunny': '☀️',
            'cloudy': '☁️'
        };

        // Get weather icon based on description
        function getWeatherIcon(description) {
            const desc = description.toLowerCase();
            for (let key in weatherIcons) {
                if (desc.includes(key)) {
                    return weatherIcons[key];
                }
            }
            return '🌤️';
        }

        // Fetch weather data from Open-Meteo API (free, no API key required)
        async function fetchWeather(city) {
            const container = document.getElementById('weatherContainer');
            
            try {
                container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading weather data...</div>';

                // First, get coordinates for the city
                const geoResponse = await fetch(
                    `https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=en&format=json`
                );
                
                if (!geoResponse.ok) throw new Error('Failed to fetch location data');
                
                const geoData = await geoResponse.json();
                
                if (!geoData.results || geoData.results.length === 0) {
                    throw new Error('City not found. Please try another location.');
                }

                const location = geoData.results[0];
                const { latitude, longitude, name, admin1, country } = location;

                // Fetch weather data
                const weatherResponse = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto`
                );

                if (!weatherResponse.ok) throw new Error('Failed to fetch weather data');

                const weatherData = await weatherResponse.json();
                const current = weatherData.current;
                const daily = weatherData.daily;

                // Decode weather code
                const weatherDescription = getWeatherDescription(current.weather_code);

                // Display current weather
                const currentHTML = `
                    <div class="current-weather">
                        <div class="city-info">
                            <div>
                                <div class="city-name">${name}${admin1 ? ', ' + admin1 : ''}</div>
                                <div class="date-time">${new Date().toLocaleDateString('en-US', { 
                                    weekday: 'long', 
                                    year: 'numeric', 
                                    month: 'long', 
                                    day: 'numeric',
                                    hour: '2-digit',
                                    minute: '2-digit'
                                })}</div>
                            </div>
                            <div style="color: #666; font-size: 0.9em;">${country}</div>
                        </div>

                        <div class="main-weather">
                            <div class="weather-icon">${getWeatherIcon(weatherDescription)}</div>
                            <div>
                                <div class="temperature">${Math.round(current.temperature_2m)}°C</div>
                                <div class="weather-description">${weatherDescription}</div>
                            </div>
                        </div>

                        <div class="weather-details">
                            <div class="detail-card">
                                <div class="detail-label">💨 Wind Speed</div>
                                <div class="detail-value">${current.wind_speed_10m} km/h</div>
                            </div>
                            <div class="detail-card">
                                <div class="detail-label">💧 Humidity</div>
                                <div class="detail-value">${current.relative_humidity_2m}%</div>
                            </div>
                            <div class="detail-card">
                                <div class="detail-label">🌡️ Feels Like</div>
                                <div class="detail-value">${Math.round(current.temperature_2m)}°C</div>
                            </div>
                            <div class="detail-card">
                                <div class="detail-label">📊 Pressure</div>
                                <div class="detail-value">1013 mb</div>
                            </div>
                        </div>

                        <h2 style="margin-top: 40px; color: #333;">📅 5-Day Forecast</h2>
                        <div class="forecast">
                            ${daily.time.slice(0, 5).map((date, index) => {
                                const desc = getWeatherDescription(daily.weather_code[index]);
                                const maxTemp = Math.round(daily.temperature_2m_max[index]);
                                const minTemp = Math.round(daily.temperature_2m_min[index]);
                                return `
                                    <div class="forecast-card">
                                        <div class="forecast-time">${new Date(date).toLocaleDateString('en-US', { 
                                            weekday: 'short', 
                                            month: 'short', 
                                            day: 'numeric'
                                        })}</div>
                                        <div class="forecast-icon">${getWeatherIcon(desc)}</div>
                                        <div class="forecast-temp">${maxTemp}° / ${minTemp}°</div>
                                        <div class="forecast-description">${desc}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;

                container.innerHTML = currentHTML;

            } catch (error) {
                container.innerHTML = `<div class="error-message">❌ ${error.message}</div>`;
            }
        }

        // Decode WMO weather codes
        function getWeatherDescription(code) {
            const weatherCodes = {
                0: 'Clear sky',
                1: 'Mainly clear',
                2: 'Partly cloudy',
                3: 'Overcast',
                45: 'Foggy',
                48: 'Depositing rime fog',
                51: 'Light drizzle',
                53: 'Moderate drizzle',
                55: 'Dense drizzle',
                61: 'Slight rain',
                63: 'Moderate rain',
                65: 'Heavy rain',
                71: 'Slight snow',
                73: 'Moderate snow',
                75: 'Heavy snow',
                77: 'Snow grains',
                80: 'Slight rain showers',
                81: 'Moderate rain showers',
                82: 'Violent rain showers',
                85: 'Slight snow showers',
                86: 'Heavy snow showers',
                95: 'Thunderstorm',
                96: 'Thunderstorm with slight hail',
                99: 'Thunderstorm with heavy hail'
            };

            return weatherCodes[code] || 'Unknown';
        }

        // Search weather
        function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (city) {
                fetchWeather(city);
            } else {
                alert('Please enter a city name');
            }
        }

        // Search city from suggestion
        function searchCity(city) {
            document.getElementById('cityInput').value = city;
            fetchWeather(city);
        }

        // Load default city on page load
        window.addEventListener('load', () => {
            fetchWeather('London');
        });
    </script>
</body>
</html>
